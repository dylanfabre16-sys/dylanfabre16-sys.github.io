<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scan → Drive</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #0e0e0f;
    --surface: #18181a;
    --border: #2a2a2e;
    --accent: #00e5a0;
    --accent-dim: #00e5a020;
    --text: #e8e8ea;
    --muted: #6b6b72;
    --danger: #ff4d6a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 16px 22px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
  }

  .sep { color: var(--border); }

  .subtitle {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
    margin-left: auto;
    transition: background 0.3s;
  }
  .dot.live { background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: blink 1.5s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

  main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
  }

  @media (max-width: 680px) { main { grid-template-columns: 1fr; } }

  .panel { padding: 18px; border-right: 1px solid var(--border); }
  .panel:last-child { border-right: none; }

  .panel-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  #cam-wrap {
    width: 100%;
    aspect-ratio: 4/3;
    background: #000;
    border-radius: 6px;
    border: 1px solid var(--border);
    overflow: hidden;
    position: relative;
  }

  #cam-wrap video {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }

  .overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .frame {
    width: 62%;
    aspect-ratio: 1.6;
    border: 2px solid var(--accent);
    border-radius: 4px;
    box-shadow: 0 0 0 9999px rgba(0,0,0,.35);
  }

  .scanline {
    position: absolute;
    width: 62%;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: sweep 2s ease-in-out infinite;
  }

  @keyframes sweep {
    0%   { top: 20%; opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { top: 80%; opacity: 0; }
  }

  #placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: var(--muted);
    font-size: 13px;
  }

  #placeholder svg { opacity: .35; }

  .controls { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 9px 14px;
    border-radius: 5px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .07em;
    text-transform: uppercase;
    cursor: pointer;
    border: none;
    transition: filter .15s, opacity .15s;
  }
  .btn:disabled { opacity: .35; cursor: not-allowed; }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-primary:not(:disabled):hover { filter: brightness(1.1); }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:not(:disabled):hover { color: var(--text); border-color: #555; }
  .btn-del { background: transparent; color: var(--danger); border: 1px solid #ff4d6a22; font-size: 10px; }
  .btn-del:not(:disabled):hover { background: #ff4d6a12; }

  #flash {
    margin-top: 12px;
    padding: 9px 13px;
    background: var(--accent-dim);
    border: 1px solid #00e5a035;
    border-radius: 5px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    opacity: 0;
    transition: opacity .25s;
    min-height: 38px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #flash.show { opacity: 1; }

  .list-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }

  .count { margin-left: auto; font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); }

  #scan-list {
    display: flex;
    flex-direction: column;
    gap: 5px;
    max-height: 300px;
    overflow-y: auto;
    padding-right: 2px;
  }

  #scan-list::-webkit-scrollbar { width: 3px; }
  #scan-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 9px 11px;
    display: flex;
    align-items: center;
    gap: 9px;
    animation: slideIn .18s ease;
  }

  @keyframes slideIn { from { opacity:0; transform: translateY(-5px); } to { opacity:1; transform:none; } }

  .item .val {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .item .fmt, .item .time {
    font-size: 10px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    white-space: nowrap;
  }

  .item button {
    background: none; border: none; cursor: pointer;
    color: var(--muted); line-height: 0; padding: 2px; border-radius: 3px;
  }
  .item button:hover { color: var(--danger); }

  .empty { padding: 28px 0; text-align: center; color: var(--muted); font-size: 13px; }

  .divider { border-top: 1px solid var(--border); margin: 18px 0; }

  .fname-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }

  .fname-row label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    white-space: nowrap;
    text-transform: uppercase;
    letter-spacing: .1em;
  }

  .fname-row input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 7px 10px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text);
    outline: none;
  }
  .fname-row input:focus { border-color: var(--accent); }

  #drive-msg {
    margin-top: 10px;
    padding: 9px 13px;
    border-radius: 5px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    display: none;
    line-height: 1.5;
    word-break: break-word;
  }
  #drive-msg.info { background: #1a2540; border: 1px solid #3355aa40; color: #7ab2ff; display: block; }
  #drive-msg.ok   { background: var(--accent-dim); border: 1px solid #00e5a040; color: var(--accent); display: block; }
  #drive-msg.err  { background: #2a1520; border: 1px solid #ff4d6a40; color: var(--danger); display: block; }

  .torch-active {
    background: #ffb740 !important;
    color: #000 !important;
    border-color: #ffb740 !important;
  }

  #zoom-select:not(:disabled) { color: var(--text); }


  /* Mode tabs */
  .mode-tabs {
    display: flex;
    gap: 0;
    margin-bottom: 14px;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .mode-tab {
    flex: 1;
    padding: 8px 0;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    background: transparent;
    color: var(--muted);
    border: none;
    cursor: pointer;
    transition: all .15s;
  }
  .mode-tab.active { background: var(--accent); color: #000; }

  /* OCR */
  #ocr-panel { display: none; }

  #ocr-view {
    width: 100%;
    aspect-ratio: 4/3;
    background: #000;
    border-radius: 6px;
    border: 1px solid var(--border);
    overflow: hidden;
    position: relative;
  }

  #ocr-view video, #ocr-view img {
    width: 100%; height: 100%;
    object-fit: contain;
    display: block;
  }

  #ocr-svg {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }

  #ocr-svg rect {
    pointer-events: all;
    cursor: pointer;
    fill: rgba(0,229,160,0.15);
    stroke: var(--accent);
    stroke-width: 2;
    rx: 3;
    transition: fill .1s;
  }
  #ocr-svg rect.selected {
    fill: rgba(0,229,160,0.45);
    stroke: #fff;
  }

  #ocr-svg text {
    pointer-events: none;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    fill: #fff;
    paint-order: stroke;
    stroke: #000;
    stroke-width: 3px;
    stroke-linejoin: round;
  }

  .ocr-status {
    margin-top: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    min-height: 18px;
  }

  .ocr-progress {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 6px;
    overflow: hidden;
    display: none;
  }
  .ocr-progress-bar {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width .2s;
    border-radius: 2px;
  }
  #compat-warn {
    background: #2a1e10;
    border: 1px solid #ffb74040;
    color: #ffb740;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    padding: 10px 14px;
    border-radius: 5px;
    margin-bottom: 12px;
    display: none;
    line-height: 1.5;
  }
</style>
<script src="https://unpkg.com/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>

<header>
  <span class="logo">Scan</span>
  <span class="sep">→</span>
  <span class="logo" style="color:var(--text)">Drive</span>
  <span class="subtitle">barcode logger</span>
  <div class="dot" id="dot"></div>
</header>

<main>
  <div class="panel">
    <div class="mode-tabs">
      <button class="mode-tab active" id="tab-barcode" onclick="setMode('barcode')">&#9641; Barcode</button>
      <button class="mode-tab" id="tab-ocr" onclick="setMode('ocr')">&#9638; OCR / Text</button>
    </div>

    <!-- BARCODE MODE -->
    <div id="barcode-panel">
    <div id="compat-warn"></div>

    <div id="cam-wrap">
      <div id="placeholder">
        <svg width="38" height="38" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        <span id="placeholder-text">Press Start Camera</span>
      </div>
      <video id="video" autoplay muted playsinline style="display:none"></video>
      <div class="overlay" id="overlay" style="display:none">
        <div class="frame"></div>
        <div class="scanline"></div>
      </div>
    </div>

    <div class="controls">
      <button class="btn btn-primary" id="start-btn" onclick="startCamera()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        Start Camera
      </button>
      <button class="btn btn-ghost" id="stop-btn" onclick="stopCamera()" disabled>Stop</button>
      <button class="btn btn-ghost" id="torch-btn" onclick="toggleTorch()" disabled title="Flash">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
        </svg>
      </button>
      <select id="zoom-select" onchange="applyZoom()" disabled style="
        background:var(--surface);border:1px solid var(--border);border-radius:5px;
        color:var(--muted);font-family:'Space Mono',monospace;font-size:11px;
        padding:8px 10px;cursor:pointer;outline:none;">
        <option value="1">1x</option>
        <option value="1.5">1.5x</option>
        <option value="2">2x</option>
        <option value="3">3x</option>
      </select>
    </div>

    <div id="flash">
      <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
      </svg>
      <span id="flash-val"></span>
    </div>
    </div><!-- end barcode-panel -->

    <!-- OCR MODE -->
    <div id="ocr-panel">
      <div id="ocr-view">
        <video id="ocr-video" autoplay muted playsinline></video>
        <img id="ocr-img" style="display:none;"/>
        <svg id="ocr-svg" viewBox="0 0 1 1" preserveAspectRatio="none"></svg>
      </div>

      <div class="ocr-progress" id="ocr-progress"><div class="ocr-progress-bar" id="ocr-bar"></div></div>
      <div class="ocr-status" id="ocr-status">Point camera at text and tap Capture.</div>

      <div class="controls" style="margin-top:10px;">
        <button class="btn btn-primary" id="ocr-capture-btn" onclick="ocrCapture()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <circle cx="12" cy="12" r="3"/><path stroke-linecap="round" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
          </svg>
          Capture
        </button>
        <button class="btn btn-ghost" id="ocr-retake-btn" onclick="ocrRetake()" style="display:none;">Retake</button>
        <button class="btn btn-primary" id="ocr-add-btn" onclick="ocrAddSelected()" style="display:none;">
          Add Selected
        </button>
      </div>
    </div><!-- end ocr-panel -->

  </div>

  <div class="panel">
    <div class="panel-label">Scanned Barcodes</div>

    <div class="list-header">
      <button class="btn btn-del" onclick="clearList()">Clear All</button>
      <span class="count" id="count">0 items</span>
    </div>

    <div id="scan-list">
      <div class="empty" id="empty">No barcodes scanned yet.</div>
    </div>

    <div class="divider"></div>

    <!-- GitHub settings (collapsed) -->
    <div id="gh-setup" style="display:none;margin-bottom:10px;">
      <div class="fname-row"><label>Token</label><input id="gh-token" type="password" placeholder="ghp_..." style="font-size:10px;"/></div>
      <div class="fname-row"><label>Repo</label><input id="gh-repo" type="text" placeholder="username/repo" style="font-size:10px;"/></div>
      <div class="fname-row"><label>File</label><input id="gh-file" type="text" value="barcodes.csv" style="font-size:10px;"/></div>
      <button class="btn btn-ghost" onclick="saveGhSettings()" style="width:100%;justify-content:center;font-size:10px;margin-bottom:4px;">Save Settings</button>
      <div style="font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);line-height:1.6;">
        Token needs <b>Contents: Read &amp; Write</b> on the repo.<br>
        github.com → Settings → Developer settings → Fine-grained tokens
      </div>
    </div>

    <div style="display:flex;gap:8px;margin-bottom:8px;">
      <button class="btn btn-primary" id="gh-save-btn" onclick="saveToGithub()" style="flex:1;justify-content:center;">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
        Save to CSV
      </button>
      <button class="btn btn-ghost" onclick="toggleGhSetup()" style="padding:9px 10px;font-size:11px;" title="Settings">⚙</button>
    </div>

    <div id="gh-msg" style="font-family:'Space Mono',monospace;font-size:11px;min-height:20px;line-height:1.5;"></div>
  </div>
</main>

<script>
let scans        = [];
let stream       = null;
let detector     = null;
let rafId        = null;
let lastVal      = null;
let cooldownEnd  = 0;

// ── Compatibility ─────────────────────────────────────────────────
function checkCompat() {
  if (!('BarcodeDetector' in window)) {
    const w = document.getElementById('compat-warn');
    w.style.display = 'block';
    w.textContent = '⚠ BarcodeDetector not supported. Use Chrome or Edge on desktop/Android.';
    document.getElementById('start-btn').disabled = true;
    return false;
  }
  return true;
}

// ── Scan loop ─────────────────────────────────────────────────────
async function scanFrame() {
  if (!stream) return;
  const video = document.getElementById('video');
  if (video.readyState >= 2) {
    try {
      const barcodes = await detector.detect(video);
      const now = Date.now();
      for (const b of barcodes) {
        if (b.rawValue === lastVal && now < cooldownEnd) continue;
        lastVal     = b.rawValue;
        cooldownEnd = now + 1500;
        addScan(b.rawValue, b.format);
        break;
      }
    } catch (_) {}
  }
  rafId = requestAnimationFrame(scanFrame);
}

// ── Camera ────────────────────────────────────────────────────────
async function startCamera() {
  if (!checkCompat()) return;

  document.getElementById('start-btn').disabled = true;
  document.getElementById('placeholder-text').textContent = 'Starting…';

  try {
    detector = new BarcodeDetector({
      formats: ['aztec','codabar','code_39','code_93','code_128',
                'data_matrix','ean_8','ean_13','itf','pdf417',
                'qr_code','upc_a','upc_e']
    });

    try {
      stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    } catch (_) {
      stream = await navigator.mediaDevices.getUserMedia({ video: true });
    }

    const video = document.getElementById('video');
    video.srcObject = stream;
    video.style.display = '';
    document.getElementById('placeholder').style.display = 'none';
    document.getElementById('overlay').style.display = '';
    document.getElementById('stop-btn').disabled = false;
    document.getElementById('dot').classList.add('live');

    video.onloadedmetadata = () => {
      video.play().then(async () => {
        rafId = requestAnimationFrame(scanFrame);
        await applyZoom();
        // Enable torch button only if track supports it
        const track = stream.getVideoTracks()[0];
        const caps  = track.getCapabilities ? track.getCapabilities() : {};
        if (caps.torch) document.getElementById('torch-btn').disabled = false;
        document.getElementById('zoom-select').disabled = false;
      });
    };

  } catch (e) {
    document.getElementById('start-btn').disabled = false;
    stream = null;
    const w = document.getElementById('compat-warn');
    w.style.display = 'block';
    if (e.name === 'NotAllowedError' || e.name === 'PermissionDeniedError') {
      w.innerHTML = '&#9888; Camera permission was denied.<br><br>'
        + 'To fix in Chrome on Android:<br>'
        + '1. Tap the <b>info icon</b> in the address bar<br>'
        + '2. Tap <b>Permissions &rarr; Camera &rarr; Allow</b><br>'
        + '3. Reload and try again';
    } else {
      w.textContent = '\u26a0 Camera error: ' + e.name + ' — ' + e.message;
    }
    document.getElementById('placeholder-text').textContent = 'Permission needed — see warning above';
  }
}

function stopCamera() {
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  torchOn = false;

  const video = document.getElementById('video');
  video.srcObject = null;
  video.style.display = 'none';

  document.getElementById('placeholder').style.display = '';
  document.getElementById('placeholder-text').textContent = 'Press Start Camera';
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('start-btn').disabled = false;
  document.getElementById('stop-btn').disabled = true;
  document.getElementById('torch-btn').disabled = true;
  document.getElementById('torch-btn').classList.remove('torch-active');
  document.getElementById('zoom-select').disabled = true;
  document.getElementById('dot').classList.remove('live');
}

// ── List ──────────────────────────────────────────────────────────
function ts() { return new Date().toTimeString().slice(0, 8); }

function addScan(value, format) {
  scans.push({ value, format: format || '', time: ts() });
  renderList();
  flash(value);
  beep();
}

function removeItem(i) { scans.splice(i, 1); renderList(); }

function clearList() { scans = []; lastVal = null; renderList(); }

const emptyEl = document.getElementById('empty');

function renderList() {
  const list = document.getElementById('scan-list');
  document.getElementById('count').textContent =
    `${scans.length} item${scans.length !== 1 ? 's' : ''}`;

  if (scans.length === 0) {
    list.innerHTML = '';
    list.appendChild(emptyEl);
    return;
  }
  emptyEl.remove();
  list.innerHTML = '';

  [...scans].reverse().forEach((s, ri) => {
    const i = scans.length - 1 - ri;
    const el = document.createElement('div');
    el.className = 'item';
    el.innerHTML = `
      <span class="val" title="${esc(s.value)}">${esc(s.value)}</span>
      <span class="fmt">${s.format}</span>
      <span class="time">${s.time}</span>
      <button onclick="removeItem(${i})" title="Remove">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>`;
    list.appendChild(el);
  });
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function flash(val) {
  const el = document.getElementById('flash');
  document.getElementById('flash-val').textContent = val;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2200);
}

// ── Download ──────────────────────────────────────────────────────
function downloadFile() {
  if (scans.length === 0) { driveMsg('err', '✗ No barcodes to download.'); return; }
  const fname = document.getElementById('fname').value.trim() || 'barcodes.txt';
  const blob  = new Blob([buildFileContent()], { type: 'text/plain' });
  const url   = URL.createObjectURL(blob);
  const a     = document.createElement('a');
  a.href = url; a.download = fname; a.click();
  URL.revokeObjectURL(url);
}

function buildFileContent() {
  return [
    'Time\tFormat\tBarcode',
    '─'.repeat(40),
    ...scans.map(s => `${s.time}\t${s.format}\t${s.value}`),
    '',
    `Total: ${scans.length} scan(s)`,
    `Exported: ${new Date().toLocaleString()}`
  ].join('\n');
}

// ── GitHub CSV ────────────────────────────────────────────────────
function ghMsg(text, type) {
  const el = document.getElementById('gh-msg');
  el.textContent = text;
  el.style.color = type === 'ok' ? 'var(--accent)' : type === 'err' ? 'var(--danger)' : 'var(--muted)';
}

function toggleGhSetup() {
  const el = document.getElementById('gh-setup');
  el.style.display = el.style.display === 'block' ? 'none' : 'block';
  if (el.style.display === 'block') {
    document.getElementById('gh-token').value = localStorage.getItem('gh_token') || '';
    document.getElementById('gh-repo').value  = localStorage.getItem('gh_repo')  || '';
    document.getElementById('gh-file').value  = localStorage.getItem('gh_file')  || 'barcodes.csv';
  }
}

function saveGhSettings() {
  localStorage.setItem('gh_token', document.getElementById('gh-token').value.trim());
  localStorage.setItem('gh_repo',  document.getElementById('gh-repo').value.trim());
  localStorage.setItem('gh_file',  document.getElementById('gh-file').value.trim() || 'barcodes.csv');
  document.getElementById('gh-setup').style.display = 'none';
  ghMsg('Settings saved.', 'ok');
}

async function saveToGithub() {
  if (scans.length === 0) { ghMsg('Nothing to save.', 'err'); return; }
  const token = localStorage.getItem('gh_token');
  const repo  = localStorage.getItem('gh_repo');
  const file  = localStorage.getItem('gh_file') || 'barcodes.csv';
  if (!token || !repo) { toggleGhSetup(); ghMsg('Enter GitHub settings first (⚙).', 'err'); return; }

  const btn = document.getElementById('gh-save-btn');
  btn.disabled = true;
  ghMsg('Saving…', '');

  const apiUrl = `https://api.github.com/repos/${repo}/contents/${file}`;
  const headers = { Authorization: `token ${token}`, 'Content-Type': 'application/json' };

  try {
    // Get current file (need SHA to update)
    let sha = null, existing = '';
    const getRes = await fetch(apiUrl, { headers });
    if (getRes.ok) {
      const data = await getRes.json();
      sha = data.sha;
      existing = atob(data.content.replace(/\n/g, ''));
    } else if (getRes.status !== 404) {
      throw new Error(`GitHub ${getRes.status}`);
    }

    // Append new rows
    const header = 'Timestamp,Barcode,Format\n';
    const newRows = scans.map(s => `${new Date().toISOString().slice(0,10)} ${s.time},${s.value},${s.format}`).join('\n') + '\n';
    const combined = existing || header;
    const updated  = combined + newRows;

    const body = { message: `Add ${scans.length} barcode(s)`, content: btoa(unescape(encodeURIComponent(updated))) };
    if (sha) body.sha = sha;

    const putRes = await fetch(apiUrl, { method: 'PUT', headers, body: JSON.stringify(body) });
    if (!putRes.ok) {
      const err = await putRes.json();
      throw new Error(err.message || `PUT ${putRes.status}`);
    }

    ghMsg(`✓ ${scans.length} row(s) saved to ${file}`, 'ok');
    scans = []; lastVal = null; renderList();
  } catch(e) {
    ghMsg('✗ ' + e.message, 'err');
  } finally {
    btn.disabled = false;
  }
}

// ── Beep ──────────────────────────────────────────────────────────
let audioCtx = null;
function beep() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const play = () => {
      const osc  = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(1480, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
      osc.start(); osc.stop(audioCtx.currentTime + 0.12);
    };
    if (audioCtx.state === 'suspended') {
      audioCtx.resume().then(play);
    } else {
      play();
    }
  } catch(_) {}
}

// ── Torch ─────────────────────────────────────────────────────────
let torchOn = false;
async function toggleTorch() {
  if (!stream) return;
  const track = stream.getVideoTracks()[0];
  torchOn = !torchOn;
  try {
    await track.applyConstraints({ advanced: [{ torch: torchOn }] });
    const btn = document.getElementById('torch-btn');
    btn.classList.toggle('torch-active', torchOn);
  } catch(_) { torchOn = !torchOn; }
}

// ── Zoom ──────────────────────────────────────────────────────────
async function applyZoom() {
  if (!stream) return;
  const track = stream.getVideoTracks()[0];
  const zoom  = parseFloat(document.getElementById('zoom-select').value);
  try {
    const caps = track.getCapabilities ? track.getCapabilities() : {};
    if (caps.zoom) {
      const clamped = Math.min(Math.max(zoom, caps.zoom.min), caps.zoom.max);
      await track.applyConstraints({ advanced: [{ zoom: clamped }] });
    }
  } catch(_) {}
}

renderList();

// ── Mode switching ────────────────────────────────────────────────
let currentMode = 'barcode';

function setMode(mode) {
  if (mode === currentMode) return;
  currentMode = mode;

  document.getElementById('tab-barcode').classList.toggle('active', mode === 'barcode');
  document.getElementById('tab-ocr').classList.toggle('active', mode === 'ocr');
  document.getElementById('barcode-panel').style.display = mode === 'barcode' ? 'block' : 'none';
  document.getElementById('ocr-panel').style.display     = mode === 'ocr'     ? 'block' : 'none';

  if (mode === 'ocr') {
    // Stop barcode scanner if running
    if (stream) stopCamera();
    ocrStartCamera();
  } else {
    ocrStopCamera();
    ocrRetake();
  }
}

// ── OCR camera ────────────────────────────────────────────────────
let ocrStream = null;

async function ocrStartCamera() {
  try {
    ocrStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    const v = document.getElementById('ocr-video');
    v.srcObject = ocrStream;
    v.style.display = '';
    document.getElementById('ocr-img').style.display = 'none';
    document.getElementById('ocr-capture-btn').style.display = '';
    document.getElementById('ocr-retake-btn').style.display  = 'none';
    document.getElementById('ocr-add-btn').style.display     = 'none';
    document.getElementById('ocr-svg').innerHTML = '';
    document.getElementById('ocr-status').textContent = 'Point camera at text and tap Capture.';
  } catch(e) {
    document.getElementById('ocr-status').textContent = 'Camera error: ' + e.message;
  }
}

function ocrStopCamera() {
  if (ocrStream) { ocrStream.getTracks().forEach(t => t.stop()); ocrStream = null; }
}

// ── Capture + OCR ─────────────────────────────────────────────────
let ocrWords = [];    // {text, x, y, w, h} in 0-1 normalised coords
let selected = new Set();

async function ocrCapture() {
  const video = document.getElementById('ocr-video');
  if (!ocrStream || video.readyState < 2) return;

  // Snapshot to canvas
  const canvas = document.createElement('canvas');
  canvas.width  = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);

  // Freeze display
  const dataUrl = canvas.toDataURL('image/jpeg', 0.92);
  const img = document.getElementById('ocr-img');
  img.src = dataUrl;
  img.style.display = '';
  video.style.display = 'none';

  document.getElementById('ocr-capture-btn').style.display = 'none';
  document.getElementById('ocr-retake-btn').style.display  = '';
  document.getElementById('ocr-status').textContent = 'Running OCR…';
  const prog = document.getElementById('ocr-progress');
  const bar  = document.getElementById('ocr-bar');
  prog.style.display = '';
  bar.style.width = '0%';

  selected.clear();
  ocrWords = [];
  document.getElementById('ocr-svg').innerHTML = '';

  try {
    const result = await Tesseract.recognize(canvas, 'eng', {
      logger: m => {
        if (m.status === 'recognizing text') {
          bar.style.width = (m.progress * 100).toFixed(0) + '%';
        }
      }
    });

    prog.style.display = 'none';
    const W = canvas.width, H = canvas.height;

    // Collect words with confidence > 40
    ocrWords = result.data.words
      .filter(w => w.confidence > 40 && w.text.trim().length > 1)
      .map(w => ({
        text: w.text.trim(),
        x: w.bbox.x0 / W,
        y: w.bbox.y0 / H,
        w: (w.bbox.x1 - w.bbox.x0) / W,
        h: (w.bbox.y1 - w.bbox.y0) / H,
        conf: w.confidence
      }));

    if (ocrWords.length === 0) {
      document.getElementById('ocr-status').textContent = 'No text detected. Try retaking with better lighting.';
      return;
    }

    renderOcrOverlay();
    document.getElementById('ocr-status').textContent = `${ocrWords.length} word(s) found — tap to select.`;
    document.getElementById('ocr-add-btn').style.display = '';
    updateAddBtn();

  } catch(e) {
    prog.style.display = 'none';
    document.getElementById('ocr-status').textContent = 'OCR error: ' + e.message;
  }
}

function renderOcrOverlay() {
  const svg = document.getElementById('ocr-svg');
  svg.innerHTML = '';
  svg.setAttribute('viewBox', '0 0 1 1');

  ocrWords.forEach((word, i) => {
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');

    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('x', word.x);
    rect.setAttribute('y', word.y);
    rect.setAttribute('width', word.w);
    rect.setAttribute('height', word.h);
    rect.setAttribute('rx', 0.004);
    if (selected.has(i)) rect.classList.add('selected');
    rect.addEventListener('click', () => toggleWord(i, rect));

    const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    label.setAttribute('x', word.x + word.w / 2);
    label.setAttribute('y', word.y + word.h / 2 + 0.008);
    label.setAttribute('text-anchor', 'middle');
    label.setAttribute('font-size', Math.max(word.h * 0.55, 0.018));
    label.textContent = word.text;

    g.appendChild(rect);
    g.appendChild(label);
    svg.appendChild(g);
  });
}

function toggleWord(i, rect) {
  if (selected.has(i)) {
    selected.delete(i);
    rect.classList.remove('selected');
  } else {
    selected.add(i);
    rect.classList.add('selected');
  }
  updateAddBtn();
}

function updateAddBtn() {
  const btn = document.getElementById('ocr-add-btn');
  btn.textContent = selected.size > 0
    ? `Add Selected (${selected.size})`
    : 'Add Selected';
  btn.disabled = selected.size === 0;
}

function ocrAddSelected() {
  if (selected.size === 0) return;
  selected.forEach(i => {
    const word = ocrWords[i];
    if (word) addScan(word.text, 'OCR');
  });
  selected.clear();
  updateAddBtn();
  // Go back to live camera
  ocrRetake();
  setMode('barcode');  // switch back so user sees the list
}

function ocrRetake() {
  selected.clear();
  ocrWords = [];
  document.getElementById('ocr-svg').innerHTML = '';
  const img = document.getElementById('ocr-img');
  img.style.display = 'none';
  img.src = '';
  document.getElementById('ocr-progress').style.display = 'none';
  document.getElementById('ocr-add-btn').style.display  = 'none';
  document.getElementById('ocr-status').textContent = 'Point camera at text and tap Capture.';
  if (ocrStream) {
    document.getElementById('ocr-video').style.display = '';
    document.getElementById('ocr-capture-btn').style.display = '';
    document.getElementById('ocr-retake-btn').style.display  = 'none';
  } else {
    ocrStartCamera();
  }
}

</script>
